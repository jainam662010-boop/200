<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Dashboard — Class 10Edu</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;padding:80px 0">
      <div class="spinner"></div>
    </div>
  </main>
</div>
<div id="bottomNav"></div>
<div class="page-watermark"></div>

<!-- Scripts -->
<script src="js/data-manager.js"></script>
<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>

<script>
// Simplified dashboard initialization
document.addEventListener('DOMContentLoaded', async () => {
  try {
    console.log('🚀 Dashboard loading...');
    
    // Simple data loading
    let data = { subjects: [] };
    try {
      const response = await fetch('data/subjects.json');
      if (response.ok) {
        data = await response.json();
        console.log('✅ Data loaded');
      }
    } catch (error) {
      console.warn('⚠️ Using fallback data');
      data = {
        subjects: [
          { id: 'math', name: 'Mathematics', icon: '🔢', color: '#f59e0b', chapters: 15 },
          { id: 'science', name: 'Science', icon: '🔬', color: '#10b981', chapters: 12 },
          { id: 'english', name: 'English', icon: '📖', color: '#3b82f6', chapters: 10 }
        ]
      };
    }
    
    // Render dashboard
    const main = document.getElementById('mainArea');
    const totalChapters = data.subjects.reduce((sum, subj) => sum + (subj.chapters?.length || 0), 0);
    
    main.innerHTML = `
      <div style="padding: 20px;">
        <h1 style="font-size: 2rem; margin-bottom: 8px;">🎯 Dashboard</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Welcome back! Here's your learning progress.</p>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
          <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
            <div style="font-size: 2.5rem; font-weight: 700; color: #6366f1; margin-bottom: 8px;">${totalChapters}</div>
            <div style="color: #64748b; font-size: 0.9rem;">Total Chapters</div>
          </div>
          <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
            <div style="font-size: 2.5rem; font-weight: 700; color: #10b981; margin-bottom: 8px;">5</div>
            <div style="color: #64748b; font-size: 0.9rem;">Completed</div>
          </div>
          <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
            <div style="font-size: 2.5rem; font-weight: 700; color: #f59e0b; margin-bottom: 8px;">🔥 7</div>
            <div style="color: #64748b; font-size: 0.9rem;">Day Streak</div>
          </div>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
          ${data.subjects.map(subject => `
            <a href="subject.html?id=${subject.id}" style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-decoration: none; color: inherit; display: block; transition: all 0.2s ease;">
              <div style="font-size: 2.5rem; margin-bottom: 12px;">${subject.icon}</div>
              <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 8px;">${subject.name}</div>
              <div style="font-size: 0.9rem; color: #64748b;">${subject.chapters?.length || 0} chapters</div>
            </a>
          `).join('')}
        </div>
      </div>
    `;
    
    // Simple bottom nav
    const bottomNav = document.getElementById('bottomNav');
    if (bottomNav) {
      bottomNav.innerHTML = `
        <nav style="display: flex; justify-content: space-around; padding: 12px 0; background: white; border-top: 1px solid #e2e8f0;">
          <a href="dashboard.html" style="text-align: center; color: #6366f1; text-decoration: none; padding: 8px; border-radius: 8px; background: #f0f9ff;">
            <div style="font-size: 1.2rem; margin-bottom: 4px;">🏠</div>
            <div style="font-size: 0.8rem;">Home</div>
          </a>
          <a href="subjects.html" style="text-align: center; color: #64748b; text-decoration: none; padding: 8px;">
            <div style="font-size: 1.2rem; margin-bottom: 4px;">📚</div>
            <div style="font-size: 0.8rem;">Subjects</div>
          </a>
          <a href="#" style="text-align: center; color: #64748b; text-decoration: none; padding: 8px;">
            <div style="font-size: 1.2rem; margin-bottom: 4px;">✓</div>
            <div style="font-size: 0.8rem;">Tasks</div>
          </a>
          <a href="bookmarks.html" style="text-align: center; color: #64748b; text-decoration: none; padding: 8px;">
            <div style="font-size: 1.2rem; margin-bottom: 4px;">�</div>
            <div style="font-size: 0.8rem;">Saved</div>
          </a>
          <a href="profile.html" style="text-align: center; color: #64748b; text-decoration: none; padding: 8px;">
            <div style="font-size: 1.2rem; margin-bottom: 4px;">👤</div>
            <div style="font-size: 0.8rem;">Profile</div>
          </a>
        </nav>
      `;
    }
    
    console.log('✅ Dashboard loaded successfully');
    
  } catch (error) {
    console.error('❌ Dashboard failed:', error);
    const main = document.getElementById('mainArea');
    main.innerHTML = `
      <div style="padding: 40px; text-align: center;">
        <h2 style="color: #dc2626;">❌ Dashboard Error</h2>
        <p>Could not load dashboard. Please try refreshing.</p>
        <button onclick="location.reload()" style="padding: 12px 24px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px;">Refresh</button>
      </div>
    `;
  }
});
</script>

</body>
</html>

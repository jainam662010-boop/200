<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Dashboard — Class 10Edu</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f8fafc;
  color: #1e293b;
  line-height: 1.6;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header { 
  background: white; 
  padding: 20px; 
  border-radius: 12px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
  margin-bottom: 20px; 
}
.header h1 { font-size: 2rem; margin-bottom: 8px; }
.header p { color: #64748b; }
.stats-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
  gap: 20px; 
  margin-bottom: 30px; 
}
.stat-card { 
  background: white; 
  padding: 24px; 
  border-radius: 12px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
  text-align: center; 
}
.stat-value { font-size: 2.5rem; font-weight: 700; color: #6366f1; margin-bottom: 8px; }
.stat-label { color: #64748b; font-size: 0.9rem; }
.subjects-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
  gap: 20px; 
}
.subject-card { 
  background: white; 
  padding: 24px; 
  border-radius: 12px; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
  cursor: pointer; 
  transition: all 0.2s ease; 
}
.subject-card:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
}
.subject-icon { 
  font-size: 2.5rem; 
  margin-bottom: 12px; 
}
.subject-name { 
  font-size: 1.2rem; 
  font-weight: 600; 
  margin-bottom: 8px; 
}
.subject-progress { 
  font-size: 0.9rem; 
  color: #64748b; 
}
.bottom-nav { 
  position: fixed; 
  bottom: 0; 
  left: 0; 
  right: 0; 
  background: white; 
  border-top: 1px solid #e2e8f0; 
  padding: 12px 0; 
  display: flex; 
  justify-content: space-around; 
  z-index: 1000; 
}
.nav-item { 
  text-align: center; 
  color: #64748b; 
  text-decoration: none; 
  padding: 8px; 
  border-radius: 8px; 
  transition: all 0.2s ease; 
}
.nav-item:hover, .nav-item.active { 
  color: #6366f1; 
  background: #f0f9ff; 
}
.nav-icon { 
  font-size: 1.2rem; 
  margin-bottom: 4px; 
}
.nav-label { 
  font-size: 0.8rem; 
}
.btn { 
  padding: 12px 24px; 
  border: none; 
  border-radius: 8px; 
  cursor: pointer; 
  font-weight: 600; 
  background: #6366f1; 
  color: white; 
  text-decoration: none; 
  display: inline-block; 
}
.btn:hover { background: #4f46e5; }
.error { 
  background: #fef2f2; 
  border: 1px solid #fecaca; 
  color: #dc2626; 
  padding: 16px; 
  border-radius: 8px; 
  margin: 20px 0; 
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎯 Dashboard</h1>
    <p>Welcome back! Here's your learning progress.</p>
  </div>

  <div id="dashboardContent">
    <!-- Content will be loaded here -->
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item active">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </a>
  <a href="subjects.html" class="nav-item">
    <div class="nav-icon">📚</div>
    <div class="nav-label">Subjects</div>
  </a>
  <a href="#" class="nav-item">
    <div class="nav-icon">✓</div>
    <div class="nav-label">Tasks</div>
  </a>
  <a href="bookmarks.html" class="nav-item">
    <div class="nav-icon">🔖</div>
    <div class="nav-label">Saved</div>
  </a>
  <a href="profile.html" class="nav-item">
    <div class="nav-icon">👤</div>
    <div class="nav-label">Profile</div>
  </a>
</div>

<script>
// Minimal working dashboard
const MinimalDashboard = {
  async init() {
    try {
      console.log('🚀 Initializing minimal dashboard...');
      
      // Try to load data
      let data = { subjects: [] };
      try {
        const response = await fetch('data/subjects.json');
        if (response.ok) {
          data = await response.json();
          console.log('✅ Data loaded successfully');
        }
      } catch (error) {
        console.warn('⚠️ Could not load data, using fallback');
        // Fallback data
        data = {
          subjects: [
            { id: 'math', name: 'Mathematics', icon: '🔢', color: '#f59e0b', chapters: 15 },
            { id: 'science', name: 'Science', icon: '🔬', color: '#10b981', chapters: 12 },
            { id: 'english', name: 'English', icon: '📖', color: '#3b82f6', chapters: 10 }
          ]
        };
      }
      
      // Render dashboard
      this.render(data);
      
    } catch (error) {
      console.error('❌ Dashboard init failed:', error);
      this.showError('Dashboard initialization failed. Please try refreshing.');
    }
  },
  
  render(data) {
    const content = document.getElementById('dashboardContent');
    
    // Calculate stats
    const totalChapters = data.subjects.reduce((sum, subj) => sum + (subj.chapters?.length || 0), 0);
    const completedChapters = 5; // Mock data
    const streak = 7; // Mock data
    
    content.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${totalChapters}</div>
          <div class="stat-label">Total Chapters</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${completedChapters}</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">🔥 ${streak}</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">85%</div>
          <div class="stat-label">Progress</div>
        </div>
      </div>
      
      <div class="subjects-grid">
        ${data.subjects.map(subject => `
          <a href="subject.html?id=${subject.id}" class="subject-card">
            <div class="subject-icon">${subject.icon}</div>
            <div class="subject-name">${subject.name}</div>
            <div class="subject-progress">${subject.chapters?.length || 0} chapters</div>
          </a>
        `).join('')}
      </div>
    `;
    
    console.log('✅ Dashboard rendered successfully');
  },
  
  showError(message) {
    const content = document.getElementById('dashboardContent');
    content.innerHTML = `
      <div class="error">
        <h3>❌ Error</h3>
        <p>${message}</p>
        <button class="btn" onclick="location.reload()">Refresh Page</button>
      </div>
    `;
  }
};

// Initialize dashboard
document.addEventListener('DOMContentLoaded', () => {
  MinimalDashboard.init();
});
</script>

</body>
</html>
